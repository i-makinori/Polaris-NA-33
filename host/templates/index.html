{% extends 'base.html' %}

{# タイトルを上書きしたい場合 #}
{% block title %}ホーム{% endblock %}

{% block content %}
<section class="post-list">
  <h2>新着メッセージ</h2>
  {% for post in posts %}
  <div class="post">
    <h3>{{ post.title }}</h3>
    <p>{{ post.content }}</p>
    <small>投稿者: {{ post.author_name }}</small>
  </div>
  {% else %}
  <p>まだ投稿がありません。最初の「乱雑推論」を投下してみませんか？</p>
  {% endfor %}
</section>
{% endblock %}
