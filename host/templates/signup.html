{% extends 'base.html' %}


{% block title %}ユーザ登録{% endblock %}


{% block content %}
  <h2>ユーザ登録</h2>

  ユーザとして登録することができます。

  {% if error_text %}
  <div class="alert alert-danger" style="color: white; background-color: #e74c3c; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
    <strong>エラー:</strong> {{ error_text }}
  </div>
  {% endif %}

  <form method="POST" action="{{ url_for('facemans.signup_post') }}">
    <table style="border-spacing: 10px;">
      <tr>
        <td><label for="name">名前</label></td>
        <td><input type="text" id="name" name="name" value="{{ form_name or '' }}" placeholder="例: 北辰 三十三郎" required></td>
      </tr>
      <tr>
        <td><label for="text_id">ユーザid</label></td>
        <td><input type="text" id="text_id" name="text_id" value="{{ form_text_id or '' }}" placeholder="半角英数字" required>
          <div style="font-size: 0.8em; color: #333;">
            6文字以上20文字以下で、大文字小文字数字のASCIIで、記号は <code> _ - </code>。
          </div>
        </td>
      </tr>
      <tr>
        <td><label for="email">メール</label></td>
        <td><input type="email" id="email" name="email" value="{{ form_email or '' }}" placeholder="example@mail.com" required></td>
      </tr>
      <tr>
        <td style="vertical-align: top;"><label>パスワード</label></td>
        <td>
          <input type="password" name="password_1" placeholder="" required><br />
          <input type="password" name="password_2" placeholder="再入力" required> <br />
          <div style="font-size: 0.8em; color: #333;">
            8文字以上、英数字混在。<br /> ※セキュリティのため、推測されにくいものを。
          </div>
        </td>
      </tr>
      <tr>
        <td></td>
        <td><button type="submit" style="padding: 5px 20px;">登録</button></td>
      </tr>
    </table>
  </form>

{% endblock %}
