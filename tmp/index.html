<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>p5.js Sample</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.js"></script>
  </head>
  <body>

	テストページ

    <script>
      // 最初に1回だけ実行される設定
      function setup() {
          createCanvas(400, 400); // 400x400ピクセルのキャンバスを作成
          background(220);        // 背景を薄いグレーに
      }

      // 1秒間に60回繰り返し実行される描画処理
      function draw() {
          if (mouseIsPressed) {
              fill(0);           // マウスを押している間は黒
          } else {
              fill(255);         // そうでなければ白
          }
          ellipse(mouseX, mouseY, 80, 80); // マウスの位置に円を描く
      }
    </script>

  </body>
</html>
